services:
  webtv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEBTV_VERSION: ${WEBTV_VERSION:-dev}
    image: webtv:latest
    container_name: webtv
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      WEBTV_ADDR: ${WEBTV_ADDR:-:8080}
      WEBTV_DB_PATH: ${WEBTV_DB_PATH:-/data/webtv.db}
      WEBTV_LOG_LEVEL: ${WEBTV_LOG_LEVEL:-info}
      WEBTV_APP_TITLE: ${WEBTV_APP_TITLE:-WebTV}
      WEBTV_SINGLE_CONN_POLICY: ${WEBTV_SINGLE_CONN_POLICY:-reject}
      WEBTV_FFMPEG_BIN: ${WEBTV_FFMPEG_BIN:-ffmpeg}
      WEBTV_STREAM_IDLE_TIMEOUT_SEC: ${WEBTV_STREAM_IDLE_TIMEOUT_SEC:-12}
      WEBTV_STREAM_RETRY_MAX: ${WEBTV_STREAM_RETRY_MAX:-5}
      WEBTV_STREAM_MODE_CACHE_TTL_MIN: ${WEBTV_STREAM_MODE_CACHE_TTL_MIN:-360}
      WEBTV_STREAM_MANIFEST_BACKOFF_ENABLED: ${WEBTV_STREAM_MANIFEST_BACKOFF_ENABLED:-false}
    volumes:
      - ./data:/data
